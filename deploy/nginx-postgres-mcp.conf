server {
    listen 80;
    server_name davlat-postgres.duckdns.org;

    # Redirect HTTP → HTTPS (certbot adds this automatically, keeping for clarity)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name davlat-postgres.duckdns.org;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/davlat-postgres.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davlat-postgres.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SSE endpoint — для Cowork и старых клиентов
    location /sse {
        if ($arg_token != "REPLACE_WITH_YOUR_TOKEN") {
            return 401 '{"error":"Unauthorized"}';
        }
        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # SSE messages POST handler
    location /messages {
        if ($arg_token != "REPLACE_WITH_YOUR_TOKEN") {
            return 401 '{"error":"Unauthorized"}';
        }
        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Streamable HTTP endpoint — для Claude Code CLI (--transport http)
    location /mcp {
        # ── Token auth (nginx level — first line of defence) ──────────────────
        # Replace REPLACE_WITH_YOUR_TOKEN with your actual MCP_TOKEN value.
        # Same token must also be set in /opt/PostgresMCP/.env as MCP_TOKEN=...
        if ($arg_token != "REPLACE_WITH_YOUR_TOKEN") {
            return 401 '{"error":"Unauthorized"}';
        }

        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;

        # Required for SSE streaming (server-sent events inside Streamable HTTP)
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Pass Authorization header through (app also validates Bearer token)
        proxy_pass_header  Authorization;

        # Long timeout for SSE streams
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Health check endpoint (no auth required)
    location /health {
        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Block everything else
    location / {
        return 404;
    }
}
